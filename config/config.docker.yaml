server:
  addr: ":8080"
  read_timeout: 10
  write_timeout: 10

mysql:
  dsn: "root:root@tcp(tidal-mysql:3306)/tidal?charset=utf8mb4&parseTime=true&loc=Local"
  max_open_conns: 50
  max_idle_conns: 20

redis:
  addr: "tidal-redis:6379"
  password: ""
  db: 0

rabbitmq:
  url: "amqp://guest:guest@tidal-rabbitmq:5672/"
  exchange: "tidal.settle"
  queue: "tidal.settle.queue"
  dead_letter_queue: "tidal.settle.dead"

aggregator:
  window_ttl: 3s
  shutdown_flush_timeout: 10s
  num_shards: 16
  max_combo_count: 100
  max_windows_per_shard: 100000

log:
  level: "info"
